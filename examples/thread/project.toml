# Thread-stitch E2E project (spec §5.2, v1.9): 会话化(source_dir 按场景子目录
# 分区) → segment(hybrid 滑窗) → stitch(线索缝合：短段救援 + 二遍复评) → dedup
# → extract(接缝机械占位) → pointwise trajectory 打分 → 序列标注 → verify+repair。
# fixture：五个场景子目录 = 五个会话（index 全树错开编号），对应 dev-spec §1.1
# 四规范验收场景 + 纯噪声负样本：
#   v1-serial/       101–108  订机票 4 帧 + 听音乐 4 帧（串联：2 线索零缝合）
#   v2-single-cross/ 201–210  点外卖 4+3 帧被回消息 3 帧打断（1 缝合 1 接缝）
#   v3-multi-cross/  301–315  订酒店 3+3+3 帧被打车/记备忘各 3 帧两度打断
#                             （2 缝合 2 接缝）
#   v4-noise-rescue/ 401–409  网购 4 帧 → 新闻 3 帧 → 1 低电量弹窗噪声帧 →
#                             1 帧支付尾段（below_min_len 命中救援：
#                             rescued_short=1、1 接缝、1 噪声帧）
#   neg-pure-noise/  501–505  纯噪声会话（负样本协议：零线索零缝合）
# data/ 由 tools/gen_fixtures.py 一次性生成。
schema_version = 1

[run]
input = "./data"
output = "./out/thread-labels.jsonl"
modality = "ui"
batch_size = 64                   # 47 帧 5 会话整会话装箱进一批
seed = 42

[stream]
order_by = "input_order"          # UI 模态 = pair_index 升序
key = ["source_dir"]              # 分区键：每个场景子目录一个会话

[segment]
enabled = true                    # stream 模式总开关
strategy = "hybrid"               # 滑窗 LLM 边界精化 + 逐帧噪声标记
window = 16                       # ≥ 最长会话（15 帧）：每会话恰一窗，边界裁决见全会话上下文
min_len = 2                       # v4 的 1 帧支付尾段以 below_min_len 落选→进救援候选
context = "手机屏幕操作录屏流；流中各项活动（购物、通讯、出行、资讯等）互为独立任务、彼此无从属或配合关系——用户常在任务间来回切换，被搁置的任务稍后可能切回收尾：切到另一任务处、切回被搁置任务处（含回到其支付/订单页完成收尾）都是新流程的开始（context_switch），advances 仅适用于为推进当前这一笔任务而发生的跨屏实体延续（如去短信里取验证码）；低电量弹窗、系统弹窗、通知面板、锁屏、广告弹窗等与前后操作无关的短暂插入屏属于干扰帧（interruption），不是任务切换"

[stitch]
enabled = true                    # 线索缝合总开关（要求 segment.enabled）
llm = "default"                   # 纯文本判定：摘要卡证据，无视觉必需
rescue_short = true               # below_min_len 短段按连续 run 重组先进候选池
repass = true                     # 有界二遍复评修正一遍贪心漏缝
# max_open / bias / votes / stale_gap_steps / digest_max_chars 取默认
# （4 / "conservative" / 1 / 0 / 400）

[extract]
enabled = true                    # 逐相邻帧对摘取动作；接缝序数零 LLM 机械占位
llm = "default"

[quality]
enabled = true
mode = "pointwise"
rubric = "default:trajectory"     # 轨迹四准则；无 threshold——只打分不筛

[annotate]
enabled = true
llm = "default"
instruction = """
你是移动端操作序列标注员。根据动作序列与关键帧，
标注该操作序列的任务标签（用户在做什么）、所属应用与一句话摘要。
被打断后恢复的任务请标注其完整任务（接缝步表示任务曾被打断）。
"""

[verify]
enabled = true
llm = "judge"
policy = "repair"                 # 缺陷表路由：成员手术 + 重摘取 + 重标注
max_repair_rounds = 1
extra_criteria = "补充审核约定：动作序列恒为 成员帧数−1 步（每相邻帧对摘取一步，线索接缝为机械占位步），步数比成员帧数少一是构造使然，不构成 missing_members / missing_tail 的证据；标注摘要允许概括中间成员帧的可见内容（审核证据仅含首末帧截图），除非与所给证据直接矛盾，不因此判 label_mismatch"

[trace]
enabled = true
channels = ["segment", "stitch", "extract", "verify", "schema"]
content = "refs"

[output]
meta_mode = "inline"
rejects = "full"                  # 噪声帧 rejects 行携带完整载荷（序列 = 成员清单）
schema_inline = """
{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "type": "object",
  "properties": {
    "task_label": {"type": "string"},
    "app": {"type": "string"},
    "summary": {"type": "string", "maxLength": 100}
  },
  "required": ["task_label", "app", "summary"],
  "additionalProperties": false
}
"""
