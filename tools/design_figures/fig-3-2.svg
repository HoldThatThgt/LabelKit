<svg viewBox="0 0 1000 330" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, sans-serif">
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <g font-size="12.5" text-anchor="middle">
    <rect x="20" y="40" width="170" height="90" rx="6" fill="#f6f8fa" stroke="#888"/>
    <text x="105" y="70" font-weight="bold">批内存活记录</text>
    <text x="105" y="92" font-size="11">N 条（N≥2）</text>
    <text x="105" y="110" font-size="11" fill="#666">N=1 时不发裁决调用，score 固定 0.5</text>

    <rect x="240" y="40" width="180" height="90" rx="6" fill="#fff" stroke="#c9861a"/>
    <text x="330" y="64" font-weight="bold">① 配对采样</text>
    <text x="330" y="86" font-size="11">k 轮；每轮 seed-PRNG 洗牌</text>
    <text x="330" y="104" font-size="11">相邻两两成对（完美匹配）</text>
    <text x="330" y="122" font-size="11">奇数条时末位轮空</text>

    <rect x="470" y="40" width="200" height="90" rx="6" fill="#fff" stroke="#c9861a"/>
    <text x="570" y="64" font-weight="bold">② LLM 裁决（并发）</text>
    <text x="570" y="86" font-size="11">A/B 呈现顺序随机（防位置偏差）</text>
    <text x="570" y="104" font-size="11">一次调用裁决全部 criteria</text>
    <text x="570" y="122" font-size="11">输出经 M8 校验：winner∈{A,B,tie}</text>

    <rect x="720" y="40" width="180" height="90" rx="6" fill="#fff" stroke="#c9861a"/>
    <text x="810" y="64" font-weight="bold">③ BT 拟合（每 criterion）</text>
    <text x="810" y="86" font-size="11">MM 迭代求 θ（Hunter 2004）</text>
    <text x="810" y="104" font-size="11">正则化伪计数 λ=0.1</text>
    <text x="810" y="122" font-size="11">tie 记 0.5 胜 / 0.5 负</text>

    <rect x="470" y="200" width="200" height="90" rx="6" fill="#eef8f0" stroke="#2e8b57"/>
    <text x="570" y="228" font-weight="bold">④ 归一化与聚合</text>
    <text x="570" y="250" font-size="11">score = log θ 的批内百分位 [0,1]</text>
    <text x="570" y="268" font-size="11">聚合 = Σ wᵢ·scoreᵢ / Σ wᵢ</text>

    <rect x="720" y="200" width="180" height="90" rx="6" fill="#fff" stroke="#b04a4a"/>
    <text x="810" y="228" font-weight="bold">⑤ 质量门</text>
    <text x="810" y="250" font-size="11">threshold / top_ratio 判定</text>
    <text x="810" y="268" font-size="11">⇒ status = dropped_lowq</text>
  </g>
  <g stroke="#555" stroke-width="1.8" marker-end="url(#arr4)" fill="none">
    <line x1="190" y1="85" x2="238" y2="85"/>
    <line x1="420" y1="85" x2="468" y2="85"/>
    <line x1="670" y1="85" x2="718" y2="85"/>
    <path d="M 810 130 L 810 160 L 570 160 L 570 198"/>
    <line x1="670" y1="245" x2="718" y2="245"/>
  </g>
  <text x="330" y="170" font-size="11.5" fill="#666" text-anchor="middle">成本：每 criteria-组 N·k/2 次调用（k 默认 4）</text>
</svg>