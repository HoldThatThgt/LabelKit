<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, sans-serif">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <g font-size="12.5" text-anchor="middle">
    <rect x="20" y="70" width="210" height="120" rx="6" fill="#f6f8fa" stroke="#888"/>
    <text x="125" y="100" font-weight="bold">产生方</text>
    <text x="125" y="124" font-size="11">M2–M7 / M13–M16 算子 · M9 · M10</text>
    <text x="125" y="144" font-size="11" fill="#666">经 RunContext.metrics 旁挂的</text>
    <text x="125" y="162" font-size="11" fill="#666">EventLog 发事件（3.12.3）</text>

    <rect x="290" y="70" width="190" height="120" rx="6" fill="#f6f1fb" stroke="#7a4fb5"/>
    <text x="385" y="100" font-weight="bold" fill="#7a4fb5">M12 日志 logging</text>
    <text x="385" y="124" font-size="11">标准 logging + EventLog</text>
    <text x="385" y="144" font-size="11" fill="#666">写失败 ⇒ warn 一次</text>
    <text x="385" y="162" font-size="11" fill="#666">并关闭该通道，绝不中断运行</text>

    <rect x="545" y="25" width="230" height="90" rx="6" fill="#eef3fa" stroke="#2456a6"/>
    <text x="660" y="52" font-weight="bold" fill="#2456a6">① stderr 运行日志</text>
    <text x="660" y="74" font-size="11">text | jsonl · debug…error</text>
    <text x="660" y="92" font-size="11" fill="#666">不含数据内容与提示词</text>

    <rect x="545" y="145" width="230" height="90" rx="6" fill="#eef8f0" stroke="#2e8b57"/>
    <text x="660" y="172" font-weight="bold" fill="#2e8b57">② trace 追踪日志</text>
    <text x="660" y="194" font-size="11" font-family="Menlo">{output_stem}.trace.jsonl</text>
    <text x="660" y="212" font-size="11" fill="#666">channels 过滤 · content 脱敏</text>

    <rect x="820" y="25" width="160" height="90" rx="6" fill="#fff" stroke="#2456a6"/>
    <text x="900" y="60">运维排障</text>
    <text x="900" y="82" font-size="11" fill="#666">日志采集系统</text>

    <rect x="820" y="145" width="160" height="90" rx="6" fill="#fff" stroke="#2e8b57"/>
    <text x="900" y="174">rubric 优化（7.5）</text>
    <text x="900" y="196" font-size="11" fill="#666">质量分析 / 审计</text>
    <text x="900" y="214" font-size="11" fill="#666">labelkit analyze（O5）</text>
  </g>
  <g stroke="#555" stroke-width="1.8" marker-end="url(#arr8)" fill="none">
    <line x1="230" y1="130" x2="288" y2="130"/>
    <path d="M 480 105 L 512 105 L 512 70 L 543 70"/>
    <path d="M 480 155 L 512 155 L 512 190 L 543 190"/>
    <line x1="775" y1="70" x2="818" y2="70"/>
