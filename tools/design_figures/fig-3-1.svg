<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <g font-size="12.5" text-anchor="middle">
    <rect x="20" y="30" width="180" height="220" rx="6" fill="#f6f8fa" stroke="#888"/>
    <text x="110" y="52" font-weight="bold">输入目录（递归）</text>
    <text x="110" y="80" font-family="Menlo" font-size="10.5">a/uitree_1.jsonl</text>
    <text x="110" y="100" font-family="Menlo" font-size="10.5">a/image_1.png</text>
    <text x="110" y="120" font-family="Menlo" font-size="10.5">b/uitree_2.jsonl</text>
    <text x="110" y="140" font-family="Menlo" font-size="10.5">c/image_2.jpg</text>
    <text x="110" y="160" font-family="Menlo" font-size="10.5">c/uitree_7.jsonl</text>
    <text x="110" y="180" font-family="Menlo" font-size="10.5">d/image_9.png</text>
    <text x="110" y="205" font-size="10.5" fill="#666">跨子目录允许配对</text>

    <rect x="260" y="60" width="200" height="150" rx="6" fill="#fff" stroke="#c9861a"/>
    <text x="360" y="85" font-weight="bold">① 正则提取 index</text>
    <text x="360" y="110" font-family="Menlo" font-size="10">uitree_(\d+)\.jsonl</text>
    <text x="360" y="128" font-family="Menlo" font-size="10">image_(\d+)\.(png|jpe?g)</text>
    <text x="360" y="155" font-size="11" fill="#666">建两张 index → 路径映射表</text>
    <text x="360" y="175" font-size="11" fill="#b04a4a">同 index 多文件 ⇒ 冲突</text>

    <rect x="520" y="60" width="200" height="150" rx="6" fill="#fff" stroke="#c9861a"/>
    <text x="620" y="85" font-weight="bold">② 按 index 求交集</text>
    <text x="620" y="112" font-size="11">交集 {1, 2} → 文件对</text>
    <text x="620" y="134" font-size="11">仅树 {7} / 仅图 {9}</text>
    <text x="620" y="156" font-size="11">⇒ on_missing_pair 策略</text>
    <text x="620" y="178" font-size="11" fill="#666">skip（默认）| fail</text>

    <rect x="780" y="60" width="200" height="150" rx="6" fill="#eef8f0" stroke="#2e8b57"/>
    <text x="880" y="85" font-weight="bold">③ 构造 Record</text>
    <text x="880" y="112" font-size="11">解析 uitree 节点行 → UITree</text>
    <text x="880" y="134" font-size="11">图像仅 stat → ImageRef</text>
    <text x="880" y="156" font-size="11">id = sha256(树字节+图字节)</text>
    <text x="880" y="178" font-size="11">按 index 升序产出</text>
  </g>
  <g stroke="#555" stroke-width="1.8" marker-end="url(#arr3)">
    <line x1="200" y1="135" x2="258" y2="135"/>
    <line x1="460" y1="135" x2="518" y2="135"/>
    <line x1="720" y1="135" x2="778" y2="135"/>
  </g>
</svg>